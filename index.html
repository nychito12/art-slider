<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    text-align:center;
    font-family: Arial;
    background:transparent;
    -webkit-text-size-adjust:100%;
}

/* =====================
   MAIN IMAGE
===================== */
#main{
    width:auto;
    max-width:92vw;
    max-height:75vh;
    object-fit:contain;
    border-radius:8px;
    cursor:zoom-in;
    transition: all 0.3s ease;
}

#main.wide{
    max-width:96vw;
    max-height:70vh;
}

#main.tall{
    max-width:65vw;
    max-height:85vh;
}

/* =====================
   THUMBNAIL (고정 UX)
===================== */
.thumb-wrap{
    display:flex;
    overflow-x:auto;
    gap:6px;
    margin-top:10px;
    padding:8px;
    -webkit-overflow-scrolling:touch;
}

.thumb{
    width:68px;
    height:68px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    border:2px solid transparent;
    flex:0 0 auto;
    transition:0.2s;
}

.thumb.active{
    border:2px solid #6aa84f;
    transform:scale(1.05);
}

/* =====================
   MODAL
===================== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:95vw;
    max-height:95vh;
    border-radius:10px;
}

.modal.show{
    display:flex;
}
</style>
</head>

<body>

<!-- MAIN -->
<img id="main" src="img1.png" onclick="openModal()">

<!-- THUMBNAILS -->
<div class="thumb-wrap">
<img class="thumb active" src="img1.png" onclick="changeImg(0)">
<img class="thumb" src="img2.png" onclick="changeImg(1)">
<img class="thumb" src="img3.png" onclick="changeImg(2)">
<img class="thumb" src="img4.png" onclick="changeImg(3)">
<img class="thumb" src="img5.png" onclick="changeImg(4)">
<img class="thumb" src="img6.png" onclick="changeImg(5)">
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

const images = [
"img1.png",
"img2.png",
"img3.png",
"img4.png",
"img5.png",
"img6.png"
];

let currentIndex = 0;

/* =====================
   IMAGE CHANGE (핵심)
===================== */
function showImage(index){
    const img = document.getElementById("main");
    currentIndex = index;

    img.onload = function(){
        img.classList.remove("wide","tall");

        if(img.naturalWidth > img.naturalHeight * 1.2){
            img.classList.add("wide");
        } else if(img.naturalHeight > img.naturalWidth * 1.2){
            img.classList.add("tall");
        }
    };

    img.src = images[index];

    // active 고정 (썸네일 안 움직임)
    document.querySelectorAll(".thumb").forEach((t,i)=>{
        t.classList.toggle("active", i === index);
    });
}

function changeImg(index){
    showImage(index);
}

/* =====================
   SWIPE (모바일)
===================== */
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let diff = startX - e.changedTouches[0].clientX;

    if(Math.abs(diff) > 50){
        if(diff > 0){
            next();
        } else {
            prev();
        }
    }
});

function next(){
    if(currentIndex < images.length - 1){
        showImage(currentIndex + 1);
    }
}

function prev(){
    if(currentIndex > 0){
        showImage(currentIndex - 1);
    }
}

/* =====================
   MODAL
===================== */
function openModal(){
    document.getElementById("modal").classList.add("show");
    document.getElementById("modalImg").src = images[currentIndex];
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

</script>

</body>
</html>
