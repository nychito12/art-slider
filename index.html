<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* =====================
   BASE (모바일 최적화 핵심)
===================== */
body{
    margin:0;
    text-align:center;
    font-family: Arial;
    background:transparent;
    -webkit-text-size-adjust:100%;
}

/* =====================
   MAIN IMAGE (자동 최적화)
===================== */
#main{
    width:auto;
    max-width:92vw;   /* 모바일 기준 핵심 */
    max-height:75vh;
    object-fit:contain;
    border-radius:8px;
    cursor:zoom-in;
    transition: all 0.3s ease;
}

/* 가로 이미지 */
#main.wide{
    max-width:96vw;
    max-height:70vh;
}

/* 세로 이미지 */
#main.tall{
    max-width:65vw;
    max-height:85vh;
}

/* =====================
   THUMBNAIL (모바일 스크롤 최적화)
===================== */
.thumb-wrap{
    display:flex;
    overflow-x:auto;
    gap:6px;
    margin-top:10px;
    padding:8px;
    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch; /* 🔥 모바일 부드러운 스크롤 */
}

.thumb{
    width:68px;
    height:68px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    border:2px solid transparent;
    flex:0 0 auto;
    transition:0.2s;
}

.thumb.active{
    border:2px solid #6aa84f;
    transform:scale(1.05);
}

/* =====================
   MODAL (모바일 확대 최적화)
===================== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:95vw;
    max-height:95vh;
    border-radius:10px;
}

.modal.show{
    display:flex;
}
</style>
</head>

<body>

<!-- MAIN IMAGE -->
<img id="main" src="img1.png" onclick="openModal()">

<!-- THUMBNAILS -->
<div class="thumb-wrap">

<img class="thumb active" src="img1.png" onclick="changeImg(this,'img1.png')">
<img class="thumb" src="img2.png" onclick="changeImg(this,'img2.png')">
<img class="thumb" src="img3.png" onclick="changeImg(this,'img3.png')">
<img class="thumb" src="img4.png" onclick="changeImg(this,'img4.png')">
<img class="thumb" src="img5.png" onclick="changeImg(this,'img5.png')">
<img class="thumb" src="img6.png" onclick="changeImg(this,'img6.png')">

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

function changeImg(el, src){
    const img = document.getElementById("main");

    img.onload = function(){

        // 초기화
        img.classList.remove("wide");
        img.classList.remove("tall");

        // 🔥 자동 비율 최적화
        if(img.naturalWidth > img.naturalHeight * 1.2){
            img.classList.add("wide"); // 가로
        }
        else if(img.naturalHeight > img.naturalWidth * 1.2){
            img.classList.add("tall"); // 세로
        }
    };

    img.src = src;

    // 썸네일 active
    document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    // 가운데 이동 (모바일 포함)
    el.scrollIntoView({
        behavior:"smooth",
        inline:"center",
        block:"nearest"
    });
}

/* =====================
   MODAL
===================== */
function openModal(){
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");

    modal.classList.add("show");
    modalImg.src = document.getElementById("main").src;
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

</script>

</body>
</html>
