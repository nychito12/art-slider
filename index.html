<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: Arial;
    background:transparent;
    text-align:center;
}

/* 메인 이미지 (작게) */
#main{
    width:100%;
    max-width:500px;
    border-radius:8px;
}

/* 썸네일 */
.thumb-wrap{
    white-space:nowrap;
    overflow-x:auto;
    margin-top:10px;
}

.thumb{
    width:70px;
    margin:3px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 메인 이미지 -->
<img id="main" src="img1.png">
    width:100%;
    max-width:650px;
    max-height:500px;
    object-fit:contain;

<!-- 썸네일 -->
<div class="thumb-wrap">

<img class="thumb" src="img1.png" onclick="changeImg('img1.png')">
<img class="thumb" src="img2.png" onclick="changeImg('img2.png')">
<img class="thumb" src="img3.png" onclick="changeImg('img3.png')">
<img class="thumb" src="img4.png" onclick="changeImg('img4.png')">
<img class="thumb" src="img5.png" onclick="changeImg('img5.png')">
<img class="thumb" src="img6.png" onclick="changeImg('img6.png')">

</div>

<script>
function changeImg(src){
    document.getElementById("main").src = src;
}
</script>

</body>
</html>
