<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio Slider</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f8fff9;
    text-align:center;
}

.title{
    font-size:24px;
    font-weight:bold;
    color:#6aa84f;
    margin:20px 0;
}

.main-img{
    width:100%;
    max-width:700px;
    border:3px solid #B6D7A8;
    border-radius:10px;
}

.counter{
    margin:10px 0;
    font-size:14px;
    color:#666;
}

.thumb-wrap{
    white-space:nowrap;
    overflow-x:auto;
    padding:10px;
}

.thumb{
    width:90px;
    margin:3px;
    border:2px solid #B6D7A8;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="title">🎨 SAMPLE SLIDER</div>

<!-- 대표 이미지 (GitHub 이미지로 변경 가능) -->
<img id="main" class="main-img" src="img1.jpg">

<div class="counter" id="counter">1 / 6</div>

<!-- 썸네일 -->
<div class="thumb-wrap">

<img class="thumb" src="img1.jpg" onclick="changeImg('img1.jpg',1)">
<img class="thumb" src="img2.jpg" onclick="changeImg('img2.jpg',2)">
<img class="thumb" src="img3.jpg" onclick="changeImg('img3.jpg',3)">
<img class="thumb" src="img4.jpg" onclick="changeImg('img4.jpg',4)">
<img class="thumb" src="img5.jpg" onclick="changeImg('img5.jpg',5)">
<img class="thumb" src="img6.jpg" onclick="changeImg('img6.jpg',6)">

</div>

<script>
function changeImg(src, index){
    document.getElementById("main").src = src;
    document.getElementById("counter").innerText = index + " / 6";
}
</script>

</body>
</html>
