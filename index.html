<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    text-align:center;
    font-family: Arial;
    background:transparent;
}

/* =====================
   MAIN IMAGE
===================== */
#main{
    width:auto;
    max-width:92vw;
    max-height:75vh;
    object-fit:contain;
    border-radius:8px;
    cursor:zoom-in;
}

/* =====================
   THUMBNAIL (🔥 구조 안정화 핵심)
===================== */
.thumb-wrap{
    width:100%;
    overflow-x:auto;
    padding:8px 0;
    white-space:nowrap;
    scroll-behavior:smooth;
    font-size:0; /* gap 흔들림 방지 */
}

.thumb-inner{
    display:inline-flex;
    gap:6px;
    padding:0 10px;
}

/* 🔥 절대 크기 고정 */
.thumb{
    width:68px;
    height:68px;
    flex:0 0 auto;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    border:2px solid transparent;
    box-sizing:border-box;
}

/* active는 "크기 변화 금지" */
.thumb.active{
    border:2px solid #6aa84f;
    box-shadow:0 0 0 2px rgba(106,168,79,0.25);
}

/* =====================
   MODAL
===================== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:95vw;
    max-height:95vh;
    border-radius:10px;
}

.modal.show{
    display:flex;
}
</style>
</head>

<body>

<!-- MAIN -->
<img id="main" src="img1.png" onclick="openModal()">

<!-- THUMBNAILS -->
<div class="thumb-wrap" id="thumbWrap">
    <div class="thumb-inner" id="thumbInner">

        <img class="thumb active" src="img1.png" onclick="changeImg(0)">
        <img class="thumb" src="img2.png" onclick="changeImg(1)">
        <img class="thumb" src="img3.png" onclick="changeImg(2)">
        <img class="thumb" src="img4.png" onclick="changeImg(3)">
        <img class="thumb" src="img5.png" onclick="changeImg(4)">
        <img class="thumb" src="img6.png" onclick="changeImg(5)">

    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

const images = [
"img1.png",
"img2.png",
"img3.png",
"img4.png",
"img5.png",
"img6.png"
];

let currentIndex = 0;

/* =====================
   IMAGE CHANGE
===================== */
function showImage(index){
    const img = document.getElementById("main");
    const thumbs = document.querySelectorAll(".thumb");

    currentIndex = index;

    img.src = images[index];

    img.onload = function(){
        img.classList.remove("wide","tall");

        if(img.naturalWidth > img.naturalHeight * 1.2){
            img.classList.add("wide");
        }
        else if(img.naturalHeight > img.naturalWidth * 1.2){
            img.classList.add("tall");
        }
    };

    thumbs.forEach((t,i)=>{
        t.classList.toggle("active", i === index);
    });

    centerThumb(index);
}

/* =====================
   🔥 완전 안정 scrollLeft 기반 중앙정렬
===================== */
function centerThumb(index){
    const wrap = document.getElementById("thumbWrap");
    const inner = document.getElementById("thumbInner");
    const thumbs = document.querySelectorAll(".thumb");

    const el = thumbs[index];

    const wrapWidth = wrap.offsetWidth;
    const elLeft = el.offsetLeft;
    const elWidth = el.offsetWidth;

    const target =
        elLeft - (wrapWidth / 2) + (elWidth / 2);

    wrap.scrollTo({
        left: target,
        behavior: "smooth"
    });
}

function changeImg(index){
    showImage(index);
}

/* =====================
   SWIPE
===================== */
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let diff = startX - e.changedTouches[0].clientX;

    if(Math.abs(diff) > 50){
        if(diff > 0){
            next();
        } else {
            prev();
        }
    }
});

function next(){
    if(currentIndex < images.length - 1){
        showImage(currentIndex + 1);
    }
}

function prev(){
    if(currentIndex > 0){
        showImage(currentIndex - 1);
    }
}

/* =====================
   MODAL
===================== */
function openModal(){
    document.getElementById("modal").classList.add("show");
    document.getElementById("modalImg").src = images[currentIndex];
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

</script>

</body>
</html>
