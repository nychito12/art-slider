<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    text-align:center;
    font-family: Arial;
    background:transparent;
    overflow-x:hidden;
}

/* =====================
   MAIN IMAGE
===================== */
#main{
    display:block;
    margin:0 auto;
    max-width:92vw;
    max-height:75vh;
    object-fit:contain;
    border-radius:8px;
    cursor:zoom-in;
}

/* =====================
   🔥 NAV ARROWS
===================== */
.arrow{
    position:fixed;
    top:45%;
    transform:translateY(-50%);
    font-size:40px;
    font-weight:bold;
    color:#6aa84f;
    cursor:pointer;
    user-select:none;
    z-index:10000;
    padding:10px;
    background:rgba(255,255,255,0.6);
    border-radius:10px;
}

#leftArrow{
    left:10px;
}

#rightArrow{
    right:10px;
}

/* =====================
   THUMBNAIL (간격 줄임)
===================== */
.thumb-wrap{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:4px;          /* 🔥 간격 줄임 */
    padding:6px;      /* 🔥 padding 줄임 */

    overflow-x:auto;
    -webkit-overflow-scrolling:touch;

    height:80px;      /* 🔥 살짝 줄임 */
    z-index:999;
}

.thumb{
    width:64px;       /* 🔥 약간 축소 */
    height:64px;
    flex:0 0 auto;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    border:2px solid transparent;
}

.thumb.active{
    border:2px solid #6aa84f;
    box-shadow:0 0 0 2px rgba(106,168,79,0.25);
}

/* =====================
   MODAL
===================== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal img{
    max-width:95vw;
    max-height:95vh;
    border-radius:10px;
}

.modal.show{
    display:flex;
}

</style>
</head>

<body>

<!-- MAIN -->
<img id="main" src="img1.png" onclick="openModal()">

<!-- 🔥 화살표 버튼 -->
<div id="leftArrow" class="arrow" onclick="prev()">‹</div>
<div id="rightArrow" class="arrow" onclick="next()">›</div>

<!-- THUMBNAILS -->
<div class="thumb-wrap" id="thumbWrap">

<img class="thumb active" src="img1.png" onclick="changeImg(0)">
<img class="thumb" src="img2.png" onclick="changeImg(1)">
<img class="thumb" src="img3.png" onclick="changeImg(2)">
<img class="thumb" src="img4.png" onclick="changeImg(3)">
<img class="thumb" src="img5.png" onclick="changeImg(4)">
<img class="thumb" src="img6.png" onclick="changeImg(5)">

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

const images = [
"img1.png",
"img2.png",
"img3.png",
"img4.png",
"img5.png",
"img6.png"
];

let currentIndex = 0;

/* =====================
   IMAGE CHANGE
===================== */
function showImage(index){
    const img = document.getElementById("main");
    const thumbs = document.querySelectorAll(".thumb");

    currentIndex = index;

    img.src = images[index];

    img.onload = function(){
        img.classList.remove("wide","tall");

        if(img.naturalWidth > img.naturalHeight * 1.2){
            img.classList.add("wide");
        }
        else if(img.naturalHeight > img.naturalWidth * 1.2){
            img.classList.add("tall");
        }
    };

    thumbs.forEach((t,i)=>{
        t.classList.toggle("active", i === index);
    });

    // 썸네일 중앙정렬
    thumbs[index].scrollIntoView({
        behavior:"smooth",
        inline:"center",
        block:"nearest"
    });
}

function changeImg(index){
    showImage(index);
}

/* =====================
   ARROWS
===================== */
function next(){
    if(currentIndex < images.length - 1){
        showImage(currentIndex + 1);
    }
}

function prev(){
    if(currentIndex > 0){
        showImage(currentIndex - 1);
    }
}

/* =====================
   SWIPE (모바일)
===================== */
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let diff = startX - e.changedTouches[0].clientX;

    if(Math.abs(diff) > 50){
        if(diff > 0){
            next();
        } else {
            prev();
        }
    }
});

/* =====================
   MODAL
===================== */
function openModal(){
    document.getElementById("modal").classList.add("show");
    document.getElementById("modalImg").src = images[currentIndex];
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

</script>

</body>
</html>
