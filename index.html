<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Swiper CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f8fff9;
}

.title{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    color:#6aa84f;
}

/* 메인 이미지 */
.swiper {
    width: 100%;
    max-width: 700px;
    padding-bottom: 10px;
}

.swiper-slide img{
    width:100%;
    border:3px solid #B6D7A8;
    border-radius:10px;
}

/* 하단 썸네일 */
.thumb {
    height:80px;
    opacity:0.5;
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
}

.swiper-slide-thumb-active{
    opacity:1;
}
</style>
</head>

<body>

<div class="title">🎨 SAMPLE GALLERY</div>

<!-- 메인 -->
<div class="swiper mainSwiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide"><img src="IMG1"></div>
    <div class="swiper-slide"><img src="IMG2"></div>
    <div class="swiper-slide"><img src="IMG3"></div>
    <div class="swiper-slide"><img src="IMG4"></div>
    <div class="swiper-slide"><img src="IMG5"></div>
    <div class="swiper-slide"><img src="IMG6"></div>

  </div>

  <div class="swiper-pagination"></div>
</div>

<!-- 썸네일 -->
<div class="swiper thumbSwiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide thumb"><img src="IMG1"></div>
    <div class="swiper-slide thumb"><img src="IMG2"></div>
    <div class="swiper-slide thumb"><img src="IMG3"></div>
    <div class="swiper-slide thumb"><img src="IMG4"></div>
    <div class="swiper-slide thumb"><img src="IMG5"></div>
    <div class="swiper-slide thumb"><img src="IMG6"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const thumbSwiper = new Swiper(".thumbSwiper", {
  slidesPerView: 6,
  spaceBetween: 5,
  watchSlidesProgress: true,
});

const mainSwiper = new Swiper(".mainSwiper", {
  spaceBetween: 10,
  pagination: {
    el: ".swiper-pagination",
    clickable: true,
  },
  thumbs: {
    swiper: thumbSwiper,
  },
});
</script>

</body>
</html>
