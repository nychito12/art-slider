<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: Arial;
    background:transparent;
    text-align:center;
}

/* =====================
   MAIN IMAGE
===================== */
#main{
    width:100%;
    max-width:500px;
    border-radius:8px;
    cursor:zoom-in;
    transition: all 0.3s ease;
}

#main.wide{
    max-width:750px;
}

/* =====================
   THUMBNAIL
===================== */
.thumb-wrap{
    display:flex;
    overflow-x:auto;
    justify-content:flex-start;
    gap:6px;
    margin-top:10px;
    padding:5px;
    scroll-behavior:smooth;
}

.thumb{
    width:70px;
    border-radius:6px;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.2s;
    flex:0 0 auto;
}

.thumb.active{
    border:2px solid #6aa84f;
    transform: scale(1.05);
}

/* =====================
   MODAL (이미지 확대)
===================== */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.modal.show{
    display:flex;
}
</style>
</head>

<body>

<!-- 메인 이미지 -->
<img id="main" src="img1.png" onclick="openModal()">

<!-- 썸네일 -->
<div class="thumb-wrap" id="thumbWrap">

<img class="thumb active" src="img1.png" onclick="changeImg(this,'img1.png',0)">
<img class="thumb" src="img2.png" onclick="changeImg(this,'img2.png',1)">
<img class="thumb" src="img3.png" onclick="changeImg(this,'img3.png',2)">
<img class="thumb" src="img4.png" onclick="changeImg(this,'img4.png',3)">
<img class="thumb" src="img5.png" onclick="changeImg(this,'img5.png',4)">
<img class="thumb" src="img6.png" onclick="changeImg(this,'img6.png',5)">

</div>

<!-- 모달 -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg" src="">
</div>

<script>

let currentIndex = 0;
const images = [
"img1.png",
"img2.png",
"img3.png",
"img4.png",
"img5.png",
"img6.png"
];

function changeImg(el, src, index){
    const img = document.getElementById("main");

    currentIndex = index;

    img.onload = function(){
        if(img.naturalWidth > img.naturalHeight){
            img.classList.add("wide");
        } else {
            img.classList.remove("wide");
        }
    };

    img.src = src;

    // active 처리
    document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    // 🔥 썸네일 가운데 이동
    el.scrollIntoView({
        behavior:"smooth",
        inline:"center",
        block:"nearest"
    });
}

/* =====================
   MODAL OPEN / CLOSE
===================== */
function openModal(){
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");

    modal.classList.add("show");
    modalImg.src = document.getElementById("main").src;
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

</script>

</body>
</html>
