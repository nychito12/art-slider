<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: Arial;
    background:transparent;
    text-align:center;
}

/* 메인 이미지 (작게) */
#main{
    width:100%;
    max-width:500px;   /* 👉 사이즈 줄임 */
    border-radius:8px;
}

/* 썸네일 */
.thumb-wrap{
    white-space:nowrap;
    overflow-x:auto;
    margin-top:10px;
}

.thumb{
    width:70px;   /* 👉 썸네일도 축소 */
    margin:3px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 메인 이미지 -->
<img id="main" src="img1.jpg">

<!-- 썸네일만 -->
<div class="thumb-wrap">

<img class="thumb" src="img1.jpg" onclick="changeImg('img1.jpg')">
<img class="thumb" src="img2.jpg" onclick="changeImg('img2.jpg')">
<img class="thumb" src="img3.jpg" onclick="changeImg('img3.jpg')">
<img class="thumb" src="img4.jpg" onclick="changeImg('img4.jpg')">
<img class="thumb" src="img5.jpg" onclick="changeImg('img5.jpg')">
<img class="thumb" src="img6.jpg" onclick="changeImg('img6.jpg')">

</div>

<script>
function changeImg(src){
    document.getElementById("main").src = src;
}
</script>

</body>
</html>
